<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Ankit ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    overflow: hidden;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 120px;
    font-size: 3em;
}

p {
    font-size: 1.3em;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4e78;
    cursor: pointer;
}

button:hover {
    background: #ff4e78;
    color: white;
}

/* Hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s infinite;
}

.heart::before, .heart::after {
    content: "";
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}
</style>
</head>

<body>

<h1>Sorry Ankit ❤️</h1>
<p>I didn’t mean to hurt you…<br>
You mean a lot to me 🥺</p>

<button onclick="goNext()">Please click this 🥺</button>

<script>
function goNext() {
    window.location.href = "letter.html";
}

// floating hearts
for (let i = 0; i < 30; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
